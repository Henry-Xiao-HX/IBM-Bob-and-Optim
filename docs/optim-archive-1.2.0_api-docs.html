  <style>#search-button {
  position: fixed;
  top: 28px;
  right: 28px;
  z-index: 10;
  display: flex;
  align-items: center;
  background-color: #fff;
  border-radius: 4px;
  border: 1px solid #d9d9d9;
  padding: 4px 12px 4px 8px;
  cursor: pointer;

  .icon {
    font-size: 18px;
    margin-right: 4px;
  }
}

#search-dialog {
  position: fixed;
  top: 10px;
  margin: 0 auto;
  height: 100%;
  background: transparent;
  border: none;

  .auto-complete-list {
    max-height: 265px;
  }
}

#auto-complete {
  background-color: #fff;
}

.auto-complete-list {
  .auto-complete-list-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    cursor: pointer;
    border-bottom: 1px solid #f0f0f0;
    border-radius: 0;
  }
}

.method-tag {
  display: inline-block;
  padding: 2px 0;
  border-radius: 4px;
  font-size: 11px;
  color: #fff;
  min-width: 54px;
  text-align: center;
  flex-shrink: 0;
}

.endpoint-info {
  display: flex;
  flex-direction: column;
  flex: 1;
  word-break: break-all;
  overflow-wrap: break-word;
  white-space: normal;
}

.endpoint-path {
  font-size: 13px;
}

.endpoint-summary {
  font-size: 11px;
  color: #666;
}

[data-theme=dark] {
  #search-dialog::backdrop {
    background-color: rgba(255, 255, 255, 0.1);
  }

  #search-button {
    background-color: #1f1f1f;
    border: 1px solid #444;
    color: #fff;
  }

  #auto-complete {
    background-color: #1f1f1f;
    border: 1px solid #444;
    color: #fff;
  }

  .auto-complete-list {
    background-color: #1f1f1f;
    border: 1px solid #444;

    .auto-complete-list-item {
      background-color: #1f1f1f;
      border-bottom: 1px solid #444;
      color: #fff;

      &:hover {
        background-color: #333;
      }
    }

    .auto-complete-list-item[aria-selected="true"] {
      background-color: #333;
    }
  }

  .endpoint-path {
    color: #ccc;
  }

  .endpoint-summary {
    color: #888;
  }
}</style>

{\n          \"comments\": [],\n          \"flow_type\": \"<type>\"\n        }\n      },\n      \"runtime_ref\": \"optim-runtime:1.1.0\"\n    }\n  ]\n}\n```\n\n**Important Configuration Notes:**\n\n- Generate unique UUIDs for both the `id` and pipeline `id` fields.\n- Ensure the `primary_pipeline` matches the pipeline you intend to execute.\n- The `runtime_ref` specifies the execution environment version.\n\n---\n\n## Step 2: Define Connection Nodes\n\nAdd connection nodes to reference source and target databases. These nodes link your pipeline to pre-configured connection profiles.\n\n```json\n{\n  \"op\": \"connection_profile\",\n  \"id\": \"<Connection Node UUID>\",\n  \"type\": \"binding\",\n  \"parameters\": {\n    \"connection_type\": \"<source|target>\"\n  },\n  \"connection\": {\n    \"ref\": \"<Connection UUID>\",\n    \"name\": \"<Connection Name>\",\n    \"properties\": {}\n  }\n}\n```\n\n**Connection Configuration Requirements:**\n\n- Connection profiles must already exist in your environment.\n- Ensure you have the UUID references for each connection.\n- Specify whether each connection is a `source` or `target`.\n\n---\n\n## Step 3: Define Execution Nodes\n\nExecution nodes perform the actual data operations in the pipeline. Each node is populated using existing node data from the system.\n\n```json\n{\n  \"op\": \"<access_definition|subset_definition|transform_definition|insert_definition>\",\n  \"type\": \"execution_node\",\n  \"id\": \"<Node UUID>\",\n  \"app_data\": {}            // Populated from existing node in system\n}\n```\n## Finalizing the Pipeline\nOnce all nodes are defined and added to the `nodes` array, the flow is ready for creation using the flow creation endpoint.\n","operationId":"createFlow","parameters":[{"description":"account id","in":"header","name":"account-id","type":"string"},{"description":"Access credentials in the form of a jwt token. This is the preferred method of supplying access credentials.","in":"header","name":"Auth hen to Use This Endpoint\n- To create a complete flow from scratch with new and/or existing node definitions.\n---\n\n## Step 1: Create the Pipeline Skeleton\n\nBegin by establishing the foundational structure of your flow. This skeleton serves as the container for all processing logic.\n\n```json\n{\n  \"id\": \"<Flow UUID>\",\n  \"version\": \"3.0\",\n  \"app_data\": {\n    \"optim\": {\n      \"version\": \"1.1.0\"\n    }\n  },\n  \"doc_type\": \"pipeline\",\n  \"parameters\": {},\n  \"json_schema\": \"https://api.dataplatform.ibm.com/schemas/common-pipeline/pipeline-flow/pipeline-flow-v3-schema.json\",\n  \"primary_pipeline\": \"<Primary Pipeline UUID>\",\n  \"pipelines\": [\n    {\n      \"id\": \"<Pipeline UUID>\",\n      \"name\": \"<Pipeline Name>\",\n      \"nodes\": [\n        // Nodes will be added here\n      ],\n      \"app_data\": {\n        \"ui_data\": {\n          \"comments\": [],\n          \"flow_type\": \"<type>\"\n        }\n      },\n      \"runtime_ref\": \"optim-runtime:1.1.0\"\n    }\n  ]\n}\n```\n\n**Important Configuration Notes:**\n\n- Generate unique UUIDs for both the `id` and pipeline `id` fields.\n- Ensure the `primary_pipeline` id matches the pipeline you intend to execute (only one pipeline may be included in a flow at this time).\n- The `runtime_ref` specifies the execution environment version.\n\n---\n\n## Step 2: Add Connection Nodes\n\nAdd connection nodes to reference source and target databases. These nodes link your pipeline to pre-configured connection profiles. The properties object is populated when the flow sumbitted for execution.\n\n```json\n{\n  \"op\": \"connection_profile\",\n  \"id\": \"<Connection Node UUID>\",\n  \"type\": \"binding\",\n  \"parameters\": {\n    \"connection_type\": \"<source|target>\"\n  },\n  \"connection\": {\n    \"ref\": \"<Connection UUID>\",\n    \"name\": \"<Connection Name>\",\n    \"properties\": {}\n  }\n}\n```\n\n**Connection Configuration Requirements:**\n\n- Connection profiles must orm: Creates a transform node \n- relationship: Creates a relationship node\n\nSkeleton payload for each node type:\n- <b>Subset definition node: </b>\n  ```json\n  {\n    \"op\": \"subset_definition\",\n    \"type\": \"execution_node\",\n    \"id\": \"<Subset Definition Node UUID>\",\n    \"app_data\": {\n      \"subset_tables\": [\n        {\n          \"schema\": \"<SCHEMA_NAME>\",\n          \"database\": \"<DATABASE_NAME>\",\n          \"table_name\": \"<TABLE_NAME>\",\n          \"source_table_id\": \"<Source Table UUID>\",\n          \"subset_parameters\": [\n            {\n              \"type\": \"where_clause\",\n              \"structured_conditions\": {\n                \"condition\": \"<CONDITION>\",\n                \"clauses\": [\n                  {\n                    \"value\": \"<FILTER_VALUE>\",\n                    \"operator\": \"<CONDITION_OPERATOR>\",\n                    \"table_name\": \"<TABLE_NAME>\",\n                    \"column_name\": \"<COLUMN_NAME>\",\n                    \"schema_name\": \"<SCHEMA_NAME>\",\n                    \"table_alias\": \"<TABLE_ALIAS>\"\n                  }\n                ]\n              }\n            }\n          ]\n        }\n      ]\n    }\n  }\n  ```\n\n  Example:\n  ```json\n  {\n    \"op\": \"subset_definition\",\n    \"type\": \"execution_node\",\n    \"id\": \"d6149696-f6f1-434c-a6d2-7c09d584ad9b\",\n    \"app_data\": {\n      \"name\": \"subset_node\",\n      \"subset_tables\": [\n        {\n          \"schema\": \"retail\",\n          \"database\": \"mysql\",\n          \"table_name\": \"orders\",\n          \"source_table_id\": \"91f32c4e-8ac1-4c2a-9ce2-11ab5b8937de\",\n          \"subset_parameters\": [\n            {\n  \n              \"structured_conditions\": {\n                \"clauses\": [\n                  {\n                    \"value\": \"'intransit'\",\n                    \"operator\": \"<>\",\n                    \"table_name\": \"orders\",\n                    \"column_name\": \"order_status\",\n                    \"schema_name\": \"retail\",\n                    \"table_alias\": \"\"\n                  },\n                  {\n                    \"value\": \"'completed'\",\n                    \"operator\": \"=\",\n                    \"table_name\": \"orders\",\n                    \"column_name\": \"status\",\n                    \"schema_name\": \"retail\",\n                    \"table_alias\": \"\"\n                  },\n                ]\n                 \"condition\": \"and\"\n              },\n               \"type\": \"where_clause\"\n            }\n          ]\n        }\n      ]\n    }\n  }\n  ```\n\n- <b>Transform definition node: </b>\n  ```json\n  {\n    \"op\": \"transform_definition\",\n    \"id\": \"<Transform Definition Node UUID>\",\n    \"type\": \"execution_node\",\n    \"app_data\": {\n      \"mask_tables\": [\n        {\n          \"schema\": \"<SCHEMA_NAME>\",\n          \"database\": \"<DATABASE_NAME>\",\n          \"table_name\": \"<TABLE_NAME>\",\n          \"source_table_id\": \"<Source Table UUID>\",\n          \"columns\": [\n            {\n              \"column_name_source\": \"<SOURCE_COLUMN_NAME>\",\n              \"column_name_target\": \"<TARGET_COLUMN_NAME>\",\n              \"masking_properties\": {\n                \"magen_function\": {\n                  \"name\": \"<POLICY_TYPE>\",\n                  \"type\": \"<MASKING_METHOD>\",\n                  \"config\": {}\n                },\n                \"masking_definition_id\": \"<MASKING_DEFINITION_UUID>\"\n              }\n            }\n          ]\n        }\n      ]\n    }\n  }\n  ```\n\n  Example:\n  ```json\n  {\n    \"op\": \"transform_definition\",\n    \"id\": \"a3b8c7d2-5e4f-4a1b-9c8d-7e6f5a4b3c2d\",\n    \"type\": \"execution_node\",\n    \"app_data\": {\n      \"name\": \"transform_node\",\n      \"mask_tables\": [\n        {\n          \"schema\": \"retail\",\n          \"database\": \"mysql\",\n          \"table_name\": \"customers\",\n          \"source_table_id\": \"b4c9d8e3-6f5a-4b2c-ad9e-8f7a6b5c4d3e\",\n          \"columns\": [\n            {\n              \"column_name_source\": \"email\",\n              \"column_name_target\": \"email\",\n              \"masking_properties\": {\n                \"magen_function\": {\n                  \"name\": \"Email\",\n                  \"type\": \"FormatPreservingTokenizationProcessor\",\n                  \"config\": {}\n                },\n                \"masking_definition_id\": \"c5d0e9f4-7a6b-5c3d-be0f-9a8b7c6d5e4f\"\n              }\n            },\n            {\n              \"column_name_source\": \"credit_card\",\n              \"column_name_target\": \"credit_card\",\n              \"masking_properties\": {\n                \"magen_function\": {\n                  \"name\": \"CreditCard\",\n                  \"type\": \"RedactProcessor\",\n                  \"config\": {}\n                },\n                \"masking_definition_id\": \"d6e1f0a5-8b7c-6d4e-cf1a-0b9c8d7e6f5a\"\n              }\n            }\n          ]\n        }\n      ]\n    }\n  }\n  ```\n  \n  **Note:** For transform_definition nodes, masking function values (`name` field and `type` field) must be retrieved from **GET /v1/masking/categories** endpoint.\n  This endpoint returns available masking formats grouped by category with their supported types and subtypes.\n\n  **Available Masking Methods** (one of these must be set in the `type` field):\n  \n  | Method | Description |\n  |--------|-------------|\n  | FormatPreservingRedactionProcessor | Replaces value with a constant and validates the input format |\n  | RedactProcessor | Replaces value with a constant; does not validate input format |\n  | RandomFormatFabricationProcessor | Generates random value in same format; not repeatable |\n  | RepeatableFormatFabricationProcessor | Generates repeatable value in same format |\n  | FormatPreservingTokenizationProcessor | Replaces value with unique token; repeatable and format-valid |\n  | RandomNoiseProcessor | Adds noise based on domain size; non-repeatable |\n  | RepeatableNoiseProcessor | Adds repeatable noise based on domain size |\n\n- <b>Insert definition node:</b>\n  ```json\n  {\n    \"op\": \"insert_definition\",\n    \"type\": \"execution_node\",\n    \"id\": \"<Insert Definition Node UUID>\",\n    \"app_data\": {\n        \"table_map\": [\n            {   \"id\": \"<Table Map UUID>\"\n                \"source\": {\n                    \"source_table_id\": \"<Source Table UUID>\",\n                    \"connection_profile\": \"<Source Connection UUID>\",\n                    \"table_name\": \"<SOURCE_TABLE>\",\n                    \"schema\": \"<SOURCE_SCHEMA>\",\n                    \"database\": \"<SOURCE_DATABASE>\",\n                },\n                \"target\": {\n                    \"schema\": \"<TARGET_SCHEMA>\",\n                    \"table_name\": \"<TARGET_TABLE>\",\n                    \"database\": \"<TARGET_DATABASE>\",\n                    \"connection_profile\": \"<Target Connection UUID>\"\n                },\n                \"column_map\": [\n                    {\n                        \"source_column\": \"<SOURCE_COLUMN_NAME>\",\n                        \"target_column\": \"<TARGET_COLUMN_NAME>\"\n                    }\n                ]\n            }\n        ],\n        \"insert_parameters\": {\n            \"relational_integrity\": {\n                \"conflict_resolution\": \"<CONFLICT_RESOLUTION_OPTION>\"\n            }\n        },\n        \"drop_rows_post_archive\": \"true\"\n    }\n  }\n  ```\n\n  **Column Mappings:**\n  \n  Column mappings are defined within the insert_definition node. All mappings are specified in the column_map array. Each entry in the column_map array defines a mapping between a source and target column using the following fields:\n\n  - `source_column`: Name of the source column to be mapped from.\n  - `target_column`: Name of the corresponding column to be mapped to.\n\n  **Drop Rows Post Archive:**\n\n  To enable deletion of rows after they have been archived, set the drop_rows_post_archive field to \"true\" in the insert definition node.\n\n  By default, this field is not set, and row deletion is disabled. This field has no effect on non-archive flows.\n\n  Example:\n  ```json\n  {\n    \"op\": \"insert_definition\",\n    \"type\": \"execution_node\",\n    \"id\": \"1440b8f4-c7a9-4512-8b51-ad47f4a2108a\",\n    \"app_data\": {\n      \"name\": \"insert_node\",\n      \"table_map\": [\n        {\n          \"id\": \"7e3f4c2a-9b47-4b9c-b2e8-3c81920bd8d1\",\n          \"source\": {\n            \"source_table_id\": \"1b82e74d-d849-4f94-a6e2-1f79fe2a5c87\",\n            \"connection_profile\": \"9c2a77f4-563e-4b07-8a37-6e31a2f30752\",\n            \"table_name\": \"order_details\",\n            \"schema\": \"public\",\n            \"database\": \"postgres\"\n          },\n          \"target\": {\n            \"schema\": \"public\",\n            \"table_name\": \"order_details\",\n            \"database\": \"postgres\",\n            \"connection_profile\": \"54e7cd80-7c0b-4a47-87e0-e1b0d47fd2ad\"\n          },\n          \"column_map\": [\n            {\n              \"source_column\": \"order_id\",\n              \"target_column\": \"order_id\"\n            },\n            {\n              \"source_column\": \"customer_name\",\n              \"target_column\": \"client_name\"\n            }\n          ]\n        }\n      ],\n      \"insert_parameters\": {\n        \"relational_integrity\": {\n          \"conflict_resolution\": \"merge\"\n        }\n      },\n      \"drop_rows_post_archive\": \"true\"\n    }\n  }\n  ```\n\n  **Conflict Resolution Options:**\n  - `merge`: Insert new records, update existing.\n  - `append`: Insert new records only; skip existing.\n  - `update`: Update existing records only; skip new.\n\n- <b>Relationship definition node: </b>\n  ```json\n  {\n    \"id\": \"<Relationship Definition Node UUID>\",\n    \"type\": \"execution_node\",\n    \"op\": \"relationship_definition\",\n    \"app_data\": {\n      \"relationships\": [\n        {\n          \"id\": \"<Relationship UUID>\",\n          \"parent_table_id\": \"<Parent Table UUID>\",\n          \"child_table_id\": \"<Child Table UUID>\",\n          \"relationship_conditions\": [\n            {\n              \"parent_conditions\": {\n                \"column_name\": \"<Parent Column Name>\"\n              },\n              \"child_conditions\": {\n                \"column_name\": \"<Child Column Name>\"\n              }\n            }\n          ]\n        }\n      ]\n    }\n  }\n  ```\n\n  Example:\n  ```json\n  {\n    \"id\": \"e5f2a3b4-9c8d-4e7f-ba1c-2d3e4f5a6b7c\",\n    \"type\": \"execution_node\",\n    \"op\": \"relationship_definition\",\n    \"app_data\": {\n      \"name\": \"relationship_node\",\n      \"relationships\": [\n        {\n          \"id\": \"f6a3b4c5-0d9e-5f8a-cb2d-3e4f5a6b7c8d\",\n          \"parent_table_id\": \"91f32c4e-8ac1-4c2a-9ce2-11ab5b8937de\",\n          \"child_table_id\": \"27abc7dd-4fd3-4ec8-85fe-4f995b3b00a8\",\n          \"relationship_conditions\": [\n            {\n              \"parent_conditions\": {\n                \"column_name\": \"order_id\"\n              },\n              \"child_conditions\": {\n                \"column_name\": \"order_id\"\n              }\n            }\n          ]\n        }\n      ]\n    }\n  }\n  ```\n","operationId":"createNode","parameters":[{"description":"Access credentials in the form of a jwt token.","in":"header","name":"Authorization","required":true,"type":"string"},{"description":"ID of the access definition to associate the node with","format":"uuid","in":"header","name":"access-definition-id","required":true,"type":"string"},{"description":"Type of Node (subset, transform, relationship, insert)","enum":["subset","transform","relationship","insert"],"in":"path","name":"node_type","required":true,"type":"string"},{"descripti     <span class="icon material-symbols-outlined">search</span>
    <span class="text"></span>
  </button>
  <dialog id="search-dialog">
    <input id="auto-complete" autocomplete="off">
  </dialog>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5.26.2/swagger-ui-bundle.js" crossorigin></script>
  <script>// eslint-disable-next-line no-unused-vars
class SearchDialog {
  dialog
  autocomplete

  constructor(dialogId, inputId, openapi) {
    this.dialog = document.getElementById(dialogId)
    if (!this.dialog) {
      throw new Error(`Dialog with id "${dialogId}" not found`)
    }

    this.autocomplete = new autoComplete({
      selector: `#${inputId}`,
      placeHolder: 'Search endpoints',
      data: {
        src: this.filterEndpoints(openapi),
        keys: ['searchKey'],
      },
      searchEngine: 'loose',
      threshold: 0,
      resultsList: {
        maxResults: undefined,
        class: 'auto-complete-list',
        element: (list, data) => {
          if (data.results.length > 0) {
            list.innerHTML = ''
            data.results.forEach((item) => {
              const li = document.createElement('li')
              li.className = 'auto-complete-list-item'
              li.innerHTML = `
              <div class="method-tag method-${item.value.method.toLowerCase()}">${item.value.method}</div>
              <div class="endpoint-info">
                <div class="endpoint-path">${item.value.path}</div>
                <div class="endpoint-summary">${item.value.summary}</div>
              </div>
            `
              list.appendChild(li)
            })
          }
        },
      },
    })

    this.dialog.addEventListener('click', (event) => {
      if (event.target === this.dialog) {
        this.hide()
      }
    })
  }

  on(event, callback) {
    if (event === 'select') {
      this.autocomplete.input.addEventListener('selection', (event) => {
        callback(event.detail.selection.value)
      })
    } else {
      throw new Error(`Unsupported event: ${event}`)
    }
  }

  show() {
    this.autocomplete.input.value = ''
    this.autocomplete.start()
    this.dialog.showModal()
  }

  hide() {
    this.dialog.close()
  }

  filterEndpoints(openapi) {
    const endpoints = []
    const paths = openapi.paths
    for (const path in paths) {
      const methods = Object.keys(paths[path])
      for (const method of methods) {
        if (method === 'parameters') {
          continue
        }
        const summary = paths[path][method].summary || ''
        endpoints.push({
          searchKey: `${method} ${path} ${summary}`,
          method: method.toUpperCase(),
          path,
          operationId: paths[path][method].operationId,
          tag: paths[path][method].tags
            ? paths[path][method].tags[0]
            : 'default',
          summary,
        })
      }
    }
    return endpoints
  }
}
</script>
  <script>const THEMES = ['light', 'dark']
const themeParam = new URLSearchParams(window.location.search).get('theme')
if (THEMES.includes(themeParam)) {
  document.documentElement.setAttribute('data-theme', themeParam)
}

// ref. https://developer.mozilla.org/en-US/docs/Web/API/Navigator/platform#examples
const modifierKeyPrefix =
  navigator.platform.startsWith('Mac') || navigator.platform === 'iPhone'
    ? '⌘' // command key
    : '^' // control key

/* ref. https://swagger.io/docs/open-source-tools/swagger-ui/usage/installation/ */
window.onload = () => {
  window.ui = SwaggerUIBundle({
    spec: window.apiDocs,
    dom_id: '#swagger-ui',
    deepLinking: true,
  })

  const searchButton = document.querySelector('#search-button')
  searchButton.addEventListener('click', () => searchDialog.show())
  searchButton.querySelector('.text').textContent =
    `Search ${modifierKeyPrefix}+K`

  // eslint-disable-next-line no-undef
  const searchDialog = new SearchDialog(
    'search-dialog',
    'auto-complete',
    window.apiDocs,
  )
  searchDialog.on('select', (selection) => {
    const tag = selection.tag
    const operationId = selection.operationId
    const url = new URL(location.href)
    url.hash = `#/${tag}/${operationId}`
    location.href = url.toString()
    searchDialog.hide()

    const opblock = document.querySelector(`#operations-${tag}-${operationId}`)
    opblock.scrollIntoView({
      behavior: 'smooth',
      block: 'start',
    })
    const opblockButton = opblock.querySelector(
      '.opblock-summary-control[aria-expanded="false"]',
    )
    if (opblockButton) {
      opblockButton.click()
    }
  })

  document.addEventListener('keydown', function (e) {
    const isCmdOrCtrl = modifierKeyPrefix === '⌘' ? e.metaKey : e.ctrlKey
    if (isCmdOrCtrl && e.key.toLowerCase() === 'k') {
      searchDialog.show()
      e.preventDefault()
    }
  })
}
</script>
</body>
</html>
