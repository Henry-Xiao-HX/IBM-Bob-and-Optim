basePath: /optim
consumes:
  - application/json
  - application/vnd+ibm.dataplatform-pipeline+json
  - application/x-www-form-urlencoded
host: localhost
info:
  description: |-
    IBM Optim core functions and application management

    ### Security
    Every request must include the `Authorization` HTTP header with the value `Bearer [access_token]`.
    Most API request optim-conn-profile in header to call for database. `optim-conn-profile: [Connection profile name]`

    Schemes:
    http
    https
  license:
    name: (c) IBM. All rights reserved
  title: IBM Optim TDM - Core API server
  version: 1.1.0
paths:
  /v1/auth/logout:
    post:
      description: Logout the user.
      operationId: createAuthLogout
      parameters:
        - in: formData
          name: ClientID
          type: string
        - in: formData
          name: RefreshToken
          required: true
          type: string
      summary: Auth Logout
      tags:
        - Auth
  /v1/auth/token:
    post:
      description: Create a auth token.
      operationId: createAuthToken
      parameters:
        - in: formData
          name: ClientID
          type: string
        - default: '"password"'
          in: formData
          name: GrantType
          type: string
        - in: formData
          name: Password
          required: true
          type: string
        - default: '"openid organization"'
          in: formData
          name: Scope
          type: string
        - in: formData
          name: Username
          required: true
          type: string
      summary: Create a auth token
      tags:
        - Auth
  /v1/auth/token/refresh:
    post:
      description: Create a auth refresh token.
      operationId: createAuthRefreshToken
      parameters:
        - in: formData
          name: ClientID
          type: string
        - in: formData
          name: RefreshToken
          required: true
          type: string
      summary: Create a auth refresh token
      tags:
        - Auth
  /v1/auth/userinfo:
    get:
      description: Retrieves user information for the authenticated user.
      operationId: getAuthUserinfo
      parameters:
        - description: Access credentials in the form of a jwt token. This is the preferred method of supplying access credentials.
          in: header
          name: Authorization
          required: true
          type: string
        - description: account id
          in: header
          name: AccountID
          type: string
      summary: Retrieve user info
      tags:
        - Auth
  /v1/config:
    get:
      description: Get product configurations from environment variables
      operationId: getConfig
      summary: Get product configurations from environment variables
      tags:
        - Config
  /v1/connprofiles:
    get:
      description: Administrators can retrieve the list of all connection profiles in the system. Regular users will receive a list to which they have accessibility
      operationId: getAllConnectionProfiles
      parameters:
        - description: Access credentials in the form of a jwt token. This is the preferred method of supplying access credentials.
          in: header
          name: Authorization
          required: true
          type: string
        - description: account id
          in: header
          name: AccountID
          type: string
      summary: Retrieve all connection profiles
      tags:
        - Connection
        - Profile
    post:
      description: |-
        Create a new connection profile for a database. Both SSL and non-SSL connections can be created.
        Note:** SSL certificate, if provided, must be a **base64 encoded** string.



        ## Database-Specific Required Fields
        Supported database/connection type identifier values:** `db2, informix, localfs, mongodb, netezza, oracle, postgresql, snowflake, sqlserver, sybase, teradata`

        ### 1. **IBM Db2, Microsoft SQL Server, Oracle, PostgreSQL, Netezza, Sybase**
        Required Fields:**
        `type` (string): Database type identifier
        `database` (string): Database name
        `host` (string): Database host address
        `port` (string): Database port number
        `username` (string): Database username
        `password` (string): Database password
        `ssl` (string): SSL enabled flag - must be "true" or "false"
        If `ssl` = "true", then `ssl_certificate` (string) is also required



        ### 2. **Snowflake**
        Required Fields:**
        `type` (string): Database type identifier
        `account_name` (string): Snowflake account identifier
        `warehouse` (string): Snowflake warehouse name
        `database` (string): Database name
        `host` (string): Snowflake host address
        `username` (string): Username
        `password` (string): Password

        Note:** SSL certificate is NOT required even if SSL is enabled



        ### 3. **MongoDB**
        Required Fields:**
        `type` (string): Database type identifier
        `database` (string): Database name
        `host` (string): MongoDB host address
        `port` (string): MongoDB port number
        `username` (string): Username
        `password` (string): Password
        `auth_database` (string): Authentication database name
        `ssl` (string): SSL enabled flag - must be "true" or "false"
        If `ssl` = "true", then `ssl_certificate` (string) is also required



        ### 4. **Teradata**
        Required Fields:**
        `type` (string): Database type identifier
        `authentication_method` (string): Authentication method
        `host` (string): Teradata host address
        `username` (string): Username
        `password` (string): Password

        Note:** SSL certificate is NOT required even if SSL is enabled



        ### 5. **IBM Informix**
        Required Fields:**
        `type` (string): Database type identifier
        `server` (string): Informix server name
        `host` (string): Host address
        `port` (string): Port number
        `username` (string): Username
        `password` (string): Password
        `ssl` (string): SSL enabled flag - must be "true" or "false"
        If `ssl` = "true", then `ssl_certificate` (string) is also required



        ### 6. **Local File System**
        Required Fields:**
        `type` (string): Database type identifier
        `file_type` (string): Type of file system
      operationId: createConnectionProfile
      parameters:
        - description: Access credentials in the form of a jwt token. This is the preferred method of supplying access credentials.
          in: header
          name: Authorization
          required: true
          type: string
        - description: account id
          in: header
          name: AccountID
          type: string
        - description: All required connection profile properties for creation
          in: body
          name: Body
          required: true
          schema: {}
      summary: Create a new connection profile
      tags:
        - Connection
        - Profile
  /v1/connprofiles/{name}:
    delete:
      description: |-
        Deletes an existing connection profile by name.
        Administrators can delete any profile in the system. Regular users can only delete profiles they own or have been granted access to.
      operationId: deleteConnectionProfile
      parameters:
        - description: Access credentials in the form of a jwt token. This is the preferred method of supplying access credentials.
          in: header
          name: Authorization
          required: true
          type: string
        - description: account id
          in: header
          name: AccountID
          type: string
        - description: The specific name of the connection profile which the session user wants to delete.
          in: path
          name: Name
          required: true
          type: string
      summary: Delete existing connection profile
      tags:
        - Connection
        - Profile
    get:
      description: |-
        Retrieve the properties of a connection profile by name.
        Administrators can retrieve properties of all profiles. Regular users can only retrieve profiles they own or have been granted access to.
      operationId: getConnectionProfileByName
      parameters:
        - description: Access credentials in the form of a jwt token. This is the preferred method of supplying access credentials.
          in: header
          name: Authorization
          required: true
          type: string
        - description: account id
          in: header
          name: AccountID
          type: string
        - description: The specific name of the connection profile which the session user wants to retrieve.
          in: path
          name: Name
          required: true
          type: string
      summary: Retrieve the specific connection profile
      tags:
        - Connection
        - Profile
    put:
      description: |-
        Updates a specific connection profile by name.
        Administrators can update any profile in the system. Regular users can only update profiles they own or have been granted access to.

        See the **connectionProfile** model for full details on all properties.
      operationId: updateConnectionProfile
      parameters:
        - description: Access credentials in the form of a jwt token. This is the preferred method of supplying access credentials.
          in: header
          name: Authorization
          required: true
          type: string
        - description: account id
          in: header
          name: AccountID
          type: string
        - description: The connection profile properties
          in: body
          name: Body
          required: true
          schema: {}
        - description: The specific name of the connection profile which the session user wants to update.
          in: path
          name: Name
          required: true
          type: string
      summary: Update the specific connection profile
      tags:
        - Connection
        - Profile
  /v1/connprofiles/testConnection:
    post:
      description: Validates a given connection profile by attempting to connect to the database.
      operationId: testConnection
      parameters:
        - description: Access credentials in the form of a jwt token. This is the preferred method of supplying access credentials.
          in: header
          name: Authorization
          required: true
          type: string
        - description: account id
          in: header
          name: AccountID
          type: string
        - description: |-
            Connection profile details, including database type, host, port,
            username, password, SSL configuration, etc.
          in: body
          name: Body
          required: true
          schema: {}
      summary: Check whether the database can be connected
      tags:
        - Connection
        - Profile
  /v1/database/schemas:
    get:
      description: |-
        Retrieves schemas from database based on the provided connection profile.
        By default, results are returned in alphabetical order by schema name.
        Supports pagination, search, and filtering of system schemas.
      operationId: listSchemas
      parameters:
        - description: Access credentials in the form of a jwt token. This is the preferred method of supplying access credentials.
          in: header
          name: Authorization
          required: true
          type: string
        - description: account id
          in: header
          name: AccountID
          type: string
        - description: Sort order for schema names. Use 'true' for ascending and 'false' for descending.
          in: query
          name: IsAscend
          type: string
        - default: 25
          description: Maximum number of schemas to return in the response.
          format: int64
          in: query
          name: Limit
          type: integer
        - default: 0
          description: Number of items to skip before starting to return results (for pagination).
          format: int64
          in: query
          name: Offset
          type: integer
        - description: The connection profile name that identifies which database to query.
          in: header
          name: OptimConnProfile
          required: true
          type: string
        - description: Optional search term to filter schemas by name.
          in: query
          name: SearchName
          type: string
        - description: Whether to include system schemas in the results.
          in: query
          name: ShowSystems
          type: string
      summary: List schemas in the database
      tags:
        - Database
        - Objects
  /v1/database/schemas/{schema_name}:
    get:
      description: |-
        Retrieves detailed information about a specific schema in the connected database.
        The schema is identified by its name, provided in the path parameter.
      operationId: getSchema
      parameters:
        - description: Access credentials in the form of a jwt token. This is the preferred method of supplying access credentials.
          in: header
          name: Authorization
          required: true
          type: string
        - description: account id
          in: header
          name: AccountID
          type: string
        - description: The connection profile name that identifies which database to query.
          in: header
          name: OptimConnProfile
          required: true
          type: string
        - description: The name of the schema to retrieve.
          in: path
          name: SchemaName
          required: true
          type: string
      summary: Get schema details
      tags:
        - Database
        - Objects
  /v1/database/schemas/{schema_name}/tables:
    get:
      description: |-
        Retrieves all tables in the specified schema of the connected database.
        The results are returned alphabetically by table name. Supports pagination, search filtering, and optional inclusion of system tables.
      operationId: listSchemaTables
      parameters:
        - description: Access credentials in the form of a jwt token. This is the preferred method of supplying access credentials.
          in: header
          name: Authorization
          required: true
          type: string
        - description: account id
          in: header
          name: AccountID
          type: string
        - description: sort name in ascending order
          in: query
          name: IsAscend
          type: string
        - default: 25
          description: The number of items to return
          format: int64
          in: query
          name: Limit
          type: integer
        - default: 0
          description: The number of items to skip before starting to collect the result set
          format: int64
          in: query
          name: Offset
          type: integer
        - description: Connection profile name
          in: header
          name: OptimConnProfile
          required: true
          type: string
        - description: Schema name
          in: path
          name: SchemaName
          required: true
          type: string
        - description: name to match
          in: query
          name: SearchName
          type: string
        - description: Whether to show system objects.
          in: query
          name: ShowSystems
          type: string
      summary: Lists tables in a schema
      tags:
        - Database
        - Objects
  /v1/database/schemas/{schema_name}/tables/{table_name}:
    get:
      description: |-
        Retrieves detailed information about a specific table within a schema in the connected database.
        The table is identified by its name in the path parameter.
      operationId: getSchemaTable
      parameters:
        - description: Access credentials in the form of a jwt token. This is the preferred method of supplying access credentials.
          in: header
          name: Authorization
          required: true
          type: string
        - description: account id
          in: header
          name: AccountID
          type: string
        - description: Connection profile name
          in: header
          name: OptimConnProfile
          required: true
          type: string
        - description: Schema name
          in: path
          name: SchemaName
          required: true
          type: string
        - description: Table name
          in: path
          name: TableName
          required: true
          type: string
      summary: Returns information about a table
      tags:
        - Database
        - Objects
  /v1/database/schemas/{schema_name}/tables/{table_name}/data:
    get:
      description: |-
        Fetches data from a specific table, up to a maximum of 100,000 rows.
        Currently, tables containing CLOB, BLOB, or DBCLOB columns cannot be retrieved.
        Supports pagination using `offset` and `limit` query parameters.
      operationId: getTableData
      parameters:
        - description: Access credentials in the form of a jwt token. This is the preferred method of supplying access credentials.
          in: header
          name: Authorization
          required: true
          type: string
        - description: account id
          in: header
          name: AccountID
          type: string
        - default: 100
          description: The number of rows to return
          format: int64
          in: query
          name: Limit
          type: integer
        - default: 0
          description: The number of rows to skip before starting to collect the result set
          format: int64
          in: query
          name: Offset
          type: integer
        - description: Connection profile name
          in: header
          name: OptimConnProfile
          required: true
          type: string
        - description: Schema name
          in: path
          name: SchemaName
          required: true
          type: string
        - description: Table name
          in: path
          name: TableName
          required: true
          type: string
      summary: Get table data
      tags:
        - Database
        - Objects
  /v1/database/schemas/{schema_name}/tables/{table_name}/dependencies:
    get:
      description: |-
        Retrieves dependency information for a specific table, including ancestor tables it depends on and/or descendant tables that depend on it.
        Results are returned in order from parent to child. Supports optional depth and direction parameters.
      operationId: getTableDependencies
      parameters:
        - description: Access credentials in the form of a jwt token. This is the preferred method of supplying access credentials.
          in: header
          name: Authorization
          required: true
          type: string
        - description: account id
          in: header
          name: AccountID
          type: string
        - default: 10
          description: The number of levels of dependencies to retrieve
          format: int64
          in: query
          name: Depth
          type: integer
        - default: '"ancestors"'
          description: direction to fetch ancestors, descendants or both
          in: query
          name: Direction
          type: string
        - description: Connection profile name
          in: header
          name: OptimConnProfile
          required: true
          type: string
        - description: Schema name
          in: path
          name: SchemaName
          required: true
          type: string
        - description: The start table name
          in: path
          name: TableName
          required: true
          type: string
      summary: Get table dependencies
      tags:
        - Database
        - Objects
  /v1/database/schemas/{schema_name}/tables/{table_name}/primary_key:
    get:
      description: Return information about a table's primary key
      operationId: getTablePrimaryKey
      parameters:
        - description: Access credentials in the form of a jwt token. This is the preferred method of supplying access credentials.
          in: header
          name: Authorization
          required: true
          type: string
        - description: account id
          in: header
          name: AccountID
          type: string
        - description: Connection profile name
          in: header
          name: OptimConnProfile
          required: true
          type: string
        - description: Schema name
          in: path
          name: SchemaName
          required: true
          type: string
        - description: Table name
          in: path
          name: TableName
          required: true
          type: string
      summary: Returns information about a table's primary key
      tags:
        - Database
        - Objects
  /v1/flow:
    delete:
      description: Delete flows using the IDs
      operationId: deleteFlow
      parameters:
        - description: Access credentials in the form of a jwt token. This is the preferred method of supplying access credentials.
          in: header
          name: Authorization
          required: true
          type: string
        - description: account id
          in: header
          name: AccountID
          type: string
        - description: Flow IDs to be delete
          in: body
          name: Body
          required: true
          schema: {}
      summary: Delete flows
      tags:
        - Flow
    post:
      description: |-
        Creating a new flow using the `pipeline-flow-v3` object in JSON format, leveraging existing nodes and connection profiles in your system.

        ### Prerequisites
        Nodes must already exist in the system via the `/v1/node` endpoint. Connection profiles for source and/or target databases must already exist in the system.



        ## Step 1: Create the Pipeline Skeleton

        Begin by establishing the foundational structure of your flow. This skeleton serves as the container for all processing logic.

        ```json

        {
        "id": "<Flow UUID>",
        "version": "3.0",
        "app_data": {
        "optim": {
        "version": "1.1.0"
        }
        },
        "doc_type": "pipeline",
        "parameters": {},
        "json_schema": "https://api.dataplatform.ibm.com/schemas/common-pipeline/pipeline-flow/pipeline-flow-v3-schema.json",
        "primary_pipeline": "<Primary Pipeline UUID>",
        "pipelines": [
        {
        "id": "<Pipeline UUID>",
        "name": "<Pipeline Name>",
        "nodes": [
        Nodes will be added here
        ],
        "app_data": {
        "ui_data": {
        "comments": [],
        "flow_type": "<type>"
        }
        },
        "runtime_ref": "optim-runtime:1.1.0"
        }
        ]
        }

        ```

        Important Configuration Notes:**

        Generate unique UUIDs for both the `id` and pipeline `id` fields.
        Ensure the `primary_pipeline` matches the pipeline you intend to execute.
        The `runtime_ref` specifies the execution environment version.



        ## Step 2: Define Connection Nodes

        Add connection nodes to reference source and target databases. These nodes link your pipeline to pre-configured connection profiles.

        ```json

        {
        "op": "connection_profile",
        "id": "<Connection Node UUID>",
        "type": "binding",
        "inputs": [],
        "outputs": [],
        "parameters": {
        "connection_type": "<source|target>"
        },
        "connection": {
        "ref": "<Connection UUID>",
        "name": "<Connection Name>",
        "properties": {}
        }
        }

        ```

        Connection Configuration Requirements:**

        Connection profiles must already exist in your environment.
        Ensure you have the UUID references for each connection.
        Specify whether each connection is a `source` or `target`.



        ## Step 3: Define Execution Nodes

        Execution nodes perform the actual data operations in the pipeline. Each node is populated using existing node data from the system.

        ```json

        {
        "op": "<access_definition|subset_definition|transform_definition|insert_definition>",
        "type": "execution_node",
        "id": "<Node UUID>",
        "app_data": {}            // Populated from existing node in system
        }

        ```
        ## Finalizing the Pipeline
        Once all nodes are defined and added to the `nodes` array, the flow is ready for creation using the flow creation endpoint.
      operationId: createFlow
      parameters:
        - description: Access credentials in the form of a jwt token. This is the preferred method of supplying access credentials.
          in: header
          name: Authorization
          required: true
          type: string
        - description: account id
          in: header
          name: AccountID
          type: string
        - description: Flow, outer JSON of pipeline-flow-v3 object
          in: body
          name: Body
          required: true
          schema: {}
      summary: Create a new flow with existing nodes
      tags:
        - Flow
    put:
      description: Update a flow using the new pipeline JSON
      operationId: updateFlow
      parameters:
        - description: Access credentials in the form of a jwt token. This is the preferred method of supplying access credentials.
          in: header
          name: Authorization
          required: true
          type: string
        - description: account id
          in: header
          name: AccountID
          type: string
        - description: Flow, pipeline-flow-v3 object
          in: body
          name: Body
          required: true
          schema: {}
      summary: Update flow
      tags:
        - Flow
  /v1/flow/{id}:
    get:
      description: |-
        Get a flow by ID.
        Administrators can retrieve the any flows in the system. Regular users will be able to retrieve flow they have created.
      operationId: getSavedFlow
      parameters:
        - description: Access credentials in the form of a jwt token. This is the preferred method of supplying access credentials.
          in: header
          name: Authorization
          required: true
          type: string
        - description: account id
          in: header
          name: AccountID
          type: string
        - description: The id of the flow to retrieve.
          in: path
          name: ID
          required: true
          type: string
      summary: Get a flow by ID
      tags:
        - Flow
  /v1/flow/create-nodes:
    post:
      description: |-
        Creating a new flow using the `pipeline-flow-v3` object in JSON format, leveraging existing connection profiles and creating new nodes as needed in your system.
        If an existing node is referenced in the pipeline, the system will use the existing node stored in the system. The node is referenced by name and id. This endpoint will not edit/update an existing node.

        ### Prerequisites
        Connection profiles for source and/or target databases must already exist in the system.



        ## Step 1: Create the Pipeline Skeleton

        Begin by establishing the foundational structure of your flow. This skeleton serves as the container for all processing logic.

        ```json

        {
        "id": "<Flow UUID>",
        "version": "3.0",
        "app_data": {
        "optim": {
        "version": "1.1.0"
        }
        },
        "doc_type": "pipeline",
        "parameters": {},
        "json_schema": "https://api.dataplatform.ibm.com/schemas/common-pipeline/pipeline-flow/pipeline-flow-v3-schema.json",
        "primary_pipeline": "<Primary Pipeline UUID>",
        "pipelines": [
        {
        "id": "<Pipeline UUID>",
        "name": "<Pipeline Name>",
        "nodes": [
        Nodes will be added here
        ],
        "app_data": {
        "ui_data": {
        "comments": [],
        "flow_type": "<type>"
        }
        },
        "runtime_ref": "optim-runtime:1.1.0"
        }
        ]
        }

        ```

        Important Configuration Notes:**

        Generate unique UUIDs for both the `id` and pipeline `id` fields.
        Ensure the `primary_pipeline` matches the pipeline you intend to execute.
        The `runtime_ref` specifies the execution environment version.



        ## Step 2: Define Connection Nodes

        Add connection nodes to reference source and target databases. These nodes link your pipeline to pre-configured connection profiles.

        ```json

        {
        "op": "connection_profile",
        "id": "<Connection Node UUID>",
        "type": "binding",
        "inputs": [],
        "outputs": [],
        "parameters": {
        "connection_type": "<source|target>"
        },
        "connection": {
        "ref": "<Connection UUID>",
        "name": "<Connection Name>",
        "properties": {}
        }
        }

        ```

        Connection Configuration Requirements:**

        Connection profiles must already exist in your environment.
        Ensure you have the UUID references for each connection.
        Specify whether each connection is a `source` or `target`.



        ## Step 3: Define Execution Nodes

        Execution nodes perform the actual data operations in the pipeline. Each node is to be populated with data to be processed. Refer nodes section for more details.

        ```json

        {
        "op": "<access_definition|subset_definition|transform_definition|insert_definition>",
        "type": "execution_node",
        "id": "<Node UUID>",
        "app_data": {
        Node data to be included here.
        }
        }

        ```
        ## Finalizing the Pipeline
        Once all nodes are defined and added to the `nodes` array, the flow is ready for creation using the flow creation endpoint.
      operationId: createFlowWithNodes
      parameters:
        - description: Access credentials in the form of a jwt token. This is the preferred method of supplying access credentials.
          in: header
          name: Authorization
          required: true
          type: string
        - description: account id
          in: header
          name: AccountID
          type: string
        - description: Flow, outer JSON of pipeline-flow-v3 object
          in: body
          name: Body
          required: true
          schema: {}
      summary: Create a new flow and create each included node.
      tags:
        - Flow
  /v1/flow/preview/{id}:
    get:
      description: Get a preview of rows on subsetting and masking nodes
      operationId: getFlowPreview
      parameters:
        - description: Access credentials in the form of a jwt token. This is the preferred method of supplying access credentials.
          in: header
          name: Authorization
          required: true
          type: string
        - description: account id
          in: header
          name: AccountID
          type: string
        - description: Flow ID
          in: path
          name: ID
          required: true
          type: string
      summary: Display sample rows
      tags:
        - Flow
  /v1/flow/savedlist:
    get:
      description: |-
        List all saved flows.
